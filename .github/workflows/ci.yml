name: CI

on:
  push:
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/spp_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install platformio
      - run: pio test --project-dir firmware/shared --environment native
      - run: pio test --project-dir firmware/embedded-tests --environment native
      - run: pio run --project-dir firmware/nano
      - run: sed 's/kConfigured = false/kConfigured = true/' firmware/esp32/include/device_config.example.h > firmware/esp32/include/device_config.h
      - run: pio run --project-dir firmware/esp32
      - run: pio run --project-dir firmware/esp32 --environment esp32-loopback
